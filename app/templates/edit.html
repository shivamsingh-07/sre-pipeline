{% extends "base.html" %} {% block content %}
<a href="/" class="back-link">Back to list</a>
<h1 class="page-title">Edit Student</h1>

<div class="card edit-form">
    <form action="/edit/{{ student.id }}" method="post" class="form-grid form-add">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Name" value="{{ student.name }}" required />
        </div>
        <div class="form-group">
            <label for="age">Age</label>
            <input type="text" id="age" name="age" placeholder="Age" value="{{ student.age }}" required />
        </div>
        <div class="form-group">
            <label for="gender">Gender</label>
            <select name="gender" id="gender" required>
                <option value="" disabled>Select</option>
                <option value="Male" {% if student.gender=="Male" %}selected{% endif %}>Male</option>
                <option value="Female" {% if student.gender=="Female" %}selected{% endif %}>Female</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
    </form>
</div>
{% endblock %}
