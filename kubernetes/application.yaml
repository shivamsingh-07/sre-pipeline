apiVersion: v1
kind: ConfigMap
metadata:
  name: school-app-config
  namespace: student-api
data:
  BASE_URL: http://school-app-service.student-api.svc.cluster.local:5000
  DB_HOSTNAME: school-database-service.student-api.svc.cluster.local:3306

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-app-deployment
  namespace: student-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: school-app
  template:
    metadata:
      labels:
        app: school-app
    spec:
      nodeSelector:
        type: application
      initContainers:
        - name: migration-container
          image: abstergo07/sre-pipeline
          command:
            - sh
            - -c
            - flask db upgrade
          env:
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: school-database-config
                  key: MYSQL_DATABASE
          envFrom:
            - configMapRef:
                name: school-app-config
            - secretRef:
                name: school-app-secrets
      containers:
        - name: school-app-container
          image: abstergo07/sre-pipeline
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: school-database-config
                  key: MYSQL_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: school-app-secrets
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: school-app-secrets
                  key: MYSQL_PASSWORD
          envFrom:
            - configMapRef:
                name: school-app-config

---
apiVersion: v1
kind: Service
metadata:
  name: school-app-service
  namespace: student-api
spec:
  type: LoadBalancer
  selector:
    app: school-app
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
